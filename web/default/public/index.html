<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <meta
      name="description"
      content="OpenAI 接口聚合管理，支持多种渠道包括 Azure，可用于二次分发管理 key，仅单可执行文件，已打包好 Docker 镜像，一键部署，开箱即用"
    />
    <title>One API</title>
  <style>
  /* Reality Patch 极简风格 - 复刻yunnantripguide.com */
  :root {
    --primary-color: #00FF85 !important;
    --text-color: #ffffff !important;
    --bg-color: #000000 !important;
    --border-color: #1a1a1a !important;
  }
  html, body, #root, .ant-layout {
    background: var(--bg-color) !important;
    color: var(--text-color) !important;
    font-family: "Courier New", monospace !important;
    font-size: 14px !important;
  }
  .ant-layout-header {
    background: var(--bg-color) !important;
    border-bottom: 1px solid var(--border-color) !important;
    position: relative !important;
    padding: 16px 24px !important;
  }
  .ant-layout-header::before {
    content: "REALITY PATCH" !important;
    position: absolute !important;
    left: 24px; top: 50%;
    transform: translateY(-50%) !important;
    color: var(--primary-color) !important;
    font-size: 18px !important;
    letter-spacing: 2px !important;
    animation: breathe 4s infinite ease-in-out !important;
    z-index: 999 !important;
  }
  .logo { opacity: 0 !important; margin-left: 180px !important; }
  .ant-layout-content { background: var(--bg-color) !important; padding: 24px !important; }
  .ant-card, .ant-table, .ant-modal-content, .ant-form {
    background: var(--bg-color) !important;
    border: 1px solid var(--border-color) !important;
    border-radius: 0 !important;
  }
  .ant-table-thead > tr > th {
    background: #111 !important;
    color: var(--primary-color) !important;
    border-bottom: 1px solid var(--border-color) !important;
  }
  .ant-btn-primary {
    background: var(--primary-color) !important;
    border-color: var(--primary-color) !important;
    color: #000 !important;
    border-radius: 0 !important;
  }
  .ant-menu-item-selected {
    background: #111 !important;
    color: var(--primary-color) !important;
    border-left: 2px solid var(--primary-color) !important;
  }
  .ant-input, .ant-select-selector {
    background: #111 !important;
    border: 1px solid var(--border-color) !important;
    color: var(--text-color) !important;
    border-radius: 0 !important;
  }
  @keyframes breathe {
    0% { opacity: 0.8; text-shadow: 0 0 4px rgba(0,255,133,0.3); }
    50% { opacity: 1; text-shadow: 0 0 10px rgba(0,255,133,0.8); }
    100% { opacity: 0.8; text-shadow: 0 0 4px rgba(0,255,133,0.3); }
  }
</style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
